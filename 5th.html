<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Form for CSS registration</h1>
    <form action="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username"name="username" placeholder="Enter Your Name:">
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female" >Female</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Subscribe my youtube channel</label>
        </div>
        <div>
            <label for="comment">"Enter your Comment here:</label>
            <textarea name="comment" rows="4" cols="20" id="comment">Enter your Text here.......</textarea>

            
        </div>
        <div>
            <p>select computer language that you understand:</p>
            <input type="radio" id="html" name="fav_language" value="HTML">
  <label for="html">HTML</label><br>
  <input type="radio" id="css" name="fav_language" value="CSS">
  <label for="css">CSS</label><br>
  <input type="radio" id="javascript" name="fav_language" value="JavaScript">
  <label for="javascript">JavaScript</label>
        </div>
    </form>
</body>
</html>
